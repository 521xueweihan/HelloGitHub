name: "🐛 Bug Report / 报告漏洞或错误"
description: "Report an issue with HelloGitHub web site or script automation"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to report a bug. / 请填写此表单报告脚本或网站运行问题。
  - type: textarea
    id: description
    attributes:
      label: "Bug Description / 问题描述"
      description: "A clear description of what the issue is."
      placeholder: "e.g., Python script fails to compile content directory files..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps / 复现步骤"
      description: "How can we reproduce the error?"
      placeholder: |
        1. Run `python script/build.py`...
        2. Error output...
    validations:
      required: true
